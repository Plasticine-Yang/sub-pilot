name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check Windows release runtime wiring
        run: npm run check:windows-release-runtime

  backend:
    name: Backend (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 links against the system webkit/gtk stack, so the crate must
      # have these present even to `cargo test`-compile it.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # `tauri-build` validates the bundle resource paths at compile time, so the
      # ffmpeg binary + base model + CJK font must exist before `cargo test`.
      # The ~900MB whisper venv is dev-only and not needed to compile, so skip it.
      - name: Fetch bundle resources
        env:
          SKIP_WHISPER_VENV: "1"
        run: ./scripts/setup-resources.sh

      - name: Test
        working-directory: src-tauri
        run: cargo test --locked
